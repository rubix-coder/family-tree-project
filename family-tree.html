<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Family Tree</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#f5ebe0; min-height:100vh; padding:20px; }
.wrap { max-width:1400px; margin:0 auto; }
h1 { text-align:center; font-size:2rem; color:#1e293b; margin-bottom:16px; font-family:Georgia,serif; }
.bar { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:16px; }
.btn { padding:8px 16px; border:none; border-radius:6px; cursor:pointer; font-weight:500; font-size:.9rem; }
.blue { background:#2563eb; color:#fff; } .blue:hover { background:#1d4ed8; }
.green { background:#16a34a; color:#fff; } .green:hover { background:#15803d; }
.amber { background:#f59e0b; color:#fff; } .amber:hover { background:#d97706; }
.red { background:#dc2626; color:#fff; } .red:hover { background:#b91c1c; }
.zoom-wrap { display:flex; gap:4px; align-items:center; }
.zoom-lbl { padding:6px 12px; background:#fff; border:1px solid #cbd5e1; border-radius:6px; font-weight:700; min-width:58px; text-align:center; font-size:.85rem; }
.layout { display:grid; grid-template-columns:280px 1fr; gap:20px; }
@media(max-width:900px){.layout{grid-template-columns:1fr;}}
.panel { background:#fff; border-radius:8px; padding:18px; box-shadow:0 2px 4px rgba(0,0,0,.08); height:fit-content; }
.panel h3 { font-size:1rem; margin-bottom:14px; color:#1e293b; }
.fg { margin-bottom:12px; }
.fg label { display:block; font-size:.8rem; font-weight:600; color:#374151; margin-bottom:4px; }
.fg input,.fg select { width:100%; padding:7px; border:1px solid #cbd5e1; border-radius:4px; font-size:.88rem; }
.tree-box { background:#fff; border-radius:8px; box-shadow:0 2px 4px rgba(0,0,0,.08); overflow:hidden; }
.tree-hdr { padding:10px 14px; border-bottom:1px solid #e2e8f0; display:flex; justify-content:space-between; font-size:.9rem; }
.tree-scroll { width:100%; height:680px; overflow:auto; background:#f8fafc; }
svg { display:block; }
.node { cursor:pointer; }
.node rect { stroke-width:2; }
.male rect { fill:#93c5fd; stroke:#2563eb; }
.female rect { fill:#fbcfe8; stroke:#db2777; }
.other rect { fill:#d1d5db; stroke:#6b7280; }
.node text { font-size:11px; font-weight:700; fill:#1e293b; pointer-events:none; }
.edge { fill:none; stroke:#64748b; stroke-width:2.5; }
.spouse-edge { fill:none; stroke:#f97316; stroke-width:2.5; stroke-dasharray:6,4; }

/* ── Photo popup ── */
#photoPopup {
  position:fixed; z-index:9999; pointer-events:none;
  display:none; flex-direction:column; align-items:center; gap:8px;
}
#photoPopup.show { display:flex; }
#photoPopup .photo-ring {
  width:110px; height:110px; border-radius:50%;
  border:3px solid #fff;
  box-shadow:0 4px 24px rgba(0,0,0,.35), 0 0 0 3px #25d366;
  overflow:hidden; background:#e2e8f0;
  animation: waDp .28s cubic-bezier(.34,1.56,.64,1) both;
}
#photoPopup .photo-ring img { width:100%; height:100%; object-fit:cover; }
#photoPopup .photo-ring .no-photo {
  width:100%; height:100%; display:flex; align-items:center;
  justify-content:center; font-size:2.4rem; color:#94a3b8;
}
#photoPopup .photo-name {
  background:rgba(0,0,0,.72); color:#fff; font-size:.78rem;
  font-weight:600; padding:3px 10px; border-radius:20px;
  white-space:nowrap; animation: waDp .28s cubic-bezier(.34,1.56,.64,1) both;
  animation-delay:.05s;
}
/* Side toggle */
.side-toggle { display:flex; border-radius:6px; overflow:hidden; border:2px solid #2563eb; }
.side-toggle button { padding:7px 14px; border:none; cursor:pointer; font-weight:600; font-size:.85rem; background:#fff; color:#2563eb; transition:.15s; }
.side-toggle button.active { background:#2563eb; color:#fff; }
</style>
</head>
<body>
<!-- Photo popup -->
<div id="photoPopup">
  <div class="photo-ring">
    <div class="no-photo" id="photoIcon">👤</div>
    <img id="photoImg" style="display:none">
  </div>
  <div class="photo-name" id="photoName"></div>
</div>

<div class="wrap">
  <h1>Family Tree</h1>
  <div class="bar">
    <button class="btn blue" onclick="saveForm()">➕ Add Member</button>
    <button class="btn green" onclick="exportJSON()">💾 Save JSON</button>
    <button class="btn green" onclick="importJSON()">📂 Load JSON</button>
    <button class="btn amber" onclick="exportPNG()">🖼 PNG</button>
    <button class="btn amber" onclick="exportPDF()">📄 PDF</button>
    <button class="btn blue" onclick="resetLayout()" title="Reset to auto layout">↺ Reset Layout</button>
  </div>
  <div class="bar" style="margin-bottom:10px;">
    <label style="font-weight:600;font-size:.9rem;color:#1e293b;">View from:</label>
    <select id="personSelect" onchange="setFocalPerson(this.value)" style="padding:7px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:.9rem;min-width:180px;">
      <option value="">— Select person —</option>
    </select>
    <div class="side-toggle">
      <button id="btnPaternal" class="active" onclick="setSide('paternal')">👨 Paternal</button>
      <button id="btnMaternal" onclick="setSide('maternal')">👩 Maternal</button>
    </div>
    <div class="zoom-wrap">
      <button class="btn blue" onclick="zoom(-0.15)">−</button>
      <div class="zoom-lbl" id="zlbl">100%</div>
      <button class="btn blue" onclick="zoom(+0.15)">+</button>
    </div>
  </div>

  <div class="layout">
    <div class="panel">
      <h3>Add / Edit Member</h3>
      <form id="frm" onsubmit="saveForm(event)">
        <div class="fg"><label>Name *</label><input id="fName" required></div>
        <div class="fg"><label>Birth Year</label><input id="fBirth" type="number" placeholder="optional"></div>
        <div class="fg"><label>Gender</label>
          <select id="fGender">
            <option value="other">Other</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
          </select>
        </div>
        <div class="fg"><label>Paternal Parent <small style="color:#64748b">(father's side)</small></label><select id="fPaternalParent"><option value="">— None —</option></select></div>
        <div class="fg"><label>Maternal Parent <small style="color:#64748b">(mother's side)</small></label><select id="fMaternalParent"><option value="">— None —</option></select></div>
        <div class="fg"><label>Spouse</label><select id="fSpouse"><option value="">— None —</option></select></div>
        <div class="fg">
          <label>Photo</label>
          <input type="file" id="fPhoto" accept="image/*" onchange="previewPhoto(this)">
          <div id="photoPreview" style="margin-top:6px;display:none;text-align:center;">
            <img id="photoPreviewImg" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid #25d366;">
            <button type="button" onclick="clearPhoto()" style="display:block;margin:4px auto 0;font-size:.75rem;background:none;border:none;color:#dc2626;cursor:pointer;">✕ Remove</button>
          </div>
        </div>
        <button type="submit" class="btn blue" style="width:100%">💾 Save</button>
        <button type="button" class="btn blue" style="width:100%;margin-top:7px" onclick="clearForm()">🔄 Clear</button>
        <button type="button" id="delBtn" class="btn red" style="width:100%;margin-top:7px;display:none" onclick="deleteMember()">🗑 Delete</button>
      </form>
    </div>

    <div class="tree-box">
      <div class="tree-hdr">
        <strong>Family Tree</strong>
        <span id="cnt">0 members</span>
      </div>
      <div class="tree-scroll" id="scroll">
        <svg id="svg"></svg>
      </div>
    </div>
  </div>
</div>

<script>
let members = [], editId = null, scale = 1, currentSide = 'paternal', focalPersonId = null;
const NW = 130, NH = 46;
const CG = 20, NG = 60, VG = 120;

// ─── Person selector ───────────────────────────────────────────────────────
function getDefaultLeaf() {
  if (!members.length) return null;
  // Find leaves: members with no children in any chain
  const hasKids = new Set();
  members.forEach(m => {
    ['paternalParentId','maternalParentId','parentId'].forEach(f => { if (m[f]) hasKids.add(m[f]); });
  });
  const leaves = members.filter(m => !hasKids.has(m.id));
  return leaves.length ? leaves[leaves.length - 1].id : members[members.length - 1].id;
}

function setFocalPerson(id) {
  focalPersonId = id || null;
  nodePos = {};
  render();
}

function updatePersonSelect() {
  const sel = document.getElementById('personSelect');
  const cur = focalPersonId;
  sel.innerHTML = '<option value="">— All members —</option>';
  members.forEach(m => {
    sel.innerHTML += `<option value="${m.id}">${m.name}</option>`;
  });
  sel.value = cur || '';
}

// ─── Side toggle ───────────────────────────────────────────────────────────
function setSide(side) {
  currentSide = side;
  document.getElementById('btnPaternal').classList.toggle('active', side === 'paternal');
  document.getElementById('btnMaternal').classList.toggle('active', side === 'maternal');
  nodePos = {};
  render();
}

// ─── Persistence ───────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  try { members = JSON.parse(localStorage.getItem('ft') || '[]'); } catch{}
  members.forEach(m => { if (m.parentId && !m.paternalParentId) m.paternalParentId = m.parentId; });
  focalPersonId = getDefaultLeaf();
  render();
});
const persist = () => localStorage.setItem('ft', JSON.stringify(members));

// ─── Form ──────────────────────────────────────────────────────────────────
let pendingPhoto = null;

function previewPhoto(input) {
  const file = input.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingPhoto = e.target.result;
    document.getElementById('photoPreviewImg').src = pendingPhoto;
    document.getElementById('photoPreview').style.display = 'block';
  };
  reader.readAsDataURL(file);
}

function clearPhoto() {
  pendingPhoto = null;
  document.getElementById('fPhoto').value = '';
  document.getElementById('photoPreview').style.display = 'none';
}

function clearForm() {
  document.getElementById('frm').reset();
  editId = null; pendingPhoto = null;
  document.getElementById('delBtn').style.display = 'none';
  document.getElementById('photoPreview').style.display = 'none';
}

function loadForm(id) {
  const m = members.find(x => x.id === id); if (!m) return;
  document.getElementById('fName').value          = m.name;
  document.getElementById('fBirth').value         = m.birth || '';
  document.getElementById('fGender').value        = m.gender;
  document.getElementById('fPaternalParent').value = m.paternalParentId || m.parentId || '';
  document.getElementById('fMaternalParent').value = m.maternalParentId || '';
  document.getElementById('fSpouse').value        = m.spouseId || '';
  editId = id;
  pendingPhoto = m.photo || null;
  if (m.photo) {
    document.getElementById('photoPreviewImg').src = m.photo;
    document.getElementById('photoPreview').style.display = 'block';
  } else {
    document.getElementById('photoPreview').style.display = 'none';
  }
  document.getElementById('delBtn').style.display = 'block';
}

function saveForm(e) {
  if (e) e.preventDefault();
  const name = document.getElementById('fName').value.trim();
  if (!name) return alert('Name required');
  const d = {
    name,
    birth:            document.getElementById('fBirth').value,
    gender:           document.getElementById('fGender').value,
    paternalParentId: document.getElementById('fPaternalParent').value || null,
    maternalParentId: document.getElementById('fMaternalParent').value || null,
    spouseId:         document.getElementById('fSpouse').value || null,
    photo: pendingPhoto || (editId ? members.find(x=>x.id===editId)?.photo : null) || null
  };
  if (editId) { Object.assign(members.find(x => x.id === editId), d); editId = null; }
  else members.push({ id: Date.now().toString(), ...d });
  persist(); clearForm(); render();
}

function deleteMember() {
  if (!editId || !confirm('Delete?')) return;
  members = members.filter(x => x.id !== editId);
  persist(); clearForm(); render();
}

function populateSelects() {
  ['fPaternalParent','fMaternalParent','fSpouse'].forEach(sid => {
    const sel = document.getElementById(sid);
    const cur = sel.value;
    sel.innerHTML = `<option value="">— None —</option>`;
    members.forEach(m => {
      if (m.id !== editId)
        sel.innerHTML += `<option value="${m.id}">${m.name}</option>`;
    });
    sel.value = cur;
  });
}

// ─── Zoom ──────────────────────────────────────────────────────────────────
function zoom(delta) {
  scale = Math.min(3, Math.max(0.3, scale + delta));
  document.getElementById('svg').style.transform = `scale(${scale})`;
  document.getElementById('svg').style.transformOrigin = '0 0';
  document.getElementById('zlbl').textContent = Math.round(scale*100) + '%';
}

// ─── Layout ────────────────────────────────────────────────────────────────
function buildLayout(members) {
  if (!members) members = window.members;

  // Use paternalParentId or maternalParentId based on toggle
  // Backward compat: old data uses parentId → treat as paternalParentId
  const getParent = m =>
    currentSide === 'paternal'
      ? (m.paternalParentId || m.parentId || null)
      : (m.maternalParentId || null);

  // 1. Build child map using active parent field
  const childMap = {};
  members.forEach(m => {
    const pid = getParent(m);
    if (pid) (childMap[pid] = childMap[pid] || []).push(m.id);
  });

  // 2. Assign depth via BFS from roots (no active parent)
  const depth = {};
  members.forEach(m => { if (!getParent(m)) depth[m.id] = 0; });
  let changed = true;
  while (changed) {
    changed = false;
    members.forEach(m => {
      if (depth[m.id] != null) return;
      const pid = getParent(m);
      if (pid && depth[pid] != null) { depth[m.id] = depth[pid] + 1; changed = true; }
    });
  }
  // Unresolved: propagate from spouse
  changed = true;
  while (changed) {
    changed = false;
    members.forEach(m => {
      if (depth[m.id] != null) return;
      if (m.spouseId && depth[m.spouseId] != null) { depth[m.id] = depth[m.spouseId]; changed = true; }
    });
  }
  members.forEach(m => { if (depth[m.id] == null) depth[m.id] = 0; });

  // Sync spouses to same depth
  changed = true;
  while (changed) {
    changed = false;
    members.forEach(m => {
      if (!m.spouseId) return;
      const a = depth[m.id], b = depth[m.spouseId] ?? 0;
      if (a !== b) { const mx = Math.max(a,b); depth[m.id] = mx; depth[m.spouseId] = mx; changed = true; }
    });
  }

  // 3. Determine true roots
  const roots = members.filter(m => {
    if (getParent(m)) return false;
    if (m.spouseId) {
      const sp = members.find(x => x.id === m.spouseId);
      if (sp && getParent(sp)) return false;
    }
    return true;
  });

  // 4. Get children - deduplicate spouse-siblings
  function getKids(id, seen) {
    const m = members.find(x => x.id === id);
    const own    = (childMap[id] || []).filter(c => !seen.has(c));
    const spKids = m?.spouseId ? (childMap[m.spouseId] || []).filter(c => !seen.has(c)) : [];
    const all    = [...new Set([...own, ...spKids])];
    return all.filter(k => {
      const km = members.find(x => x.id === k);
      if (!km?.spouseId) return true;
      const spIdx = all.indexOf(km.spouseId);
      const myIdx = all.indexOf(k);
      return spIdx === -1 || myIdx < spIdx;
    });
  }

  // 5. Subtree width (recursive, tracks visited)
  function stWidth(id, seen = new Set()) {
    if (seen.has(id)) return 0;
    seen = new Set(seen); seen.add(id);
    const m = members.find(x => x.id === id);
    const hasSpouse = m?.spouseId && !seen.has(m.spouseId);
    if (hasSpouse) seen.add(m.spouseId);

    const selfW = hasSpouse ? NW*2 + CG + NG : NW + NG;
    const kids = getKids(id, seen);
    if (!kids.length) return selfW;
    const kidsW = kids.reduce((s, c) => s + stWidth(c, new Set(seen)), 0);
    return Math.max(selfW, kidsW);
  }

  // 6. Place nodes
  const pos = {};
  function place(id, cx, d, seen = new Set()) {
    if (seen.has(id) || pos[id]) return;
    seen = new Set(seen); seen.add(id);
    const m = members.find(x => x.id === id);
    if (!m) return;
    const y = d * (NH + VG) + 60;

    // Find spouse either from m.spouseId or reverse lookup
    const spouseId = m.spouseId || members.find(x => x.spouseId === id)?.id;

    if (spouseId && !seen.has(spouseId)) {
      seen.add(spouseId);
      pos[id]       = { x: cx - NW - CG/2, y };
      pos[spouseId] = { x: cx + CG/2,      y };
    } else {
      pos[id] = { x: cx - NW/2, y };
    }
    const kids = getKids(id, seen);
    if (!kids.length) return;
    const widths = kids.map(c => stWidth(c, new Set(seen)));
    const total  = widths.reduce((a,b) => a+b, 0);
    let x = cx - total/2;
    kids.forEach((c, i) => {
      place(c, x + widths[i]/2, d+1, new Set(seen));
      x += widths[i];
    });
  }

  let rx = 80;
  roots.forEach(r => {
    const w = stWidth(r.id);
    place(r.id, rx + w/2, 0);
    rx += w + NG;
  });

  // Fallback: any member still without a position gets placed next to their spouse or at the end
  members.forEach(m => {
    if (pos[m.id]) return;
    const spouseId = m.spouseId || members.find(x => x.spouseId === m.id)?.id;
    if (spouseId && pos[spouseId]) {
      pos[m.id] = { x: pos[spouseId].x + NW + CG, y: pos[spouseId].y };
    } else {
      pos[m.id] = { x: rx, y: 60 };
      rx += NW + CG;
    }
  });

  return { pos, childMap, depth };
}

// ─── Draw ──────────────────────────────────────────────────────────────────
let nodePos = {};   // overrides: id → {x,y}
let layoutPos = {}; // last auto-layout result

function resetLayout() { nodePos = {}; drawTree(); }

function drawTree() {
  const svg = document.getElementById('svg');
  svg.innerHTML = '';

  function getVisibleMembers() {
    const targetId = focalPersonId || getDefaultLeaf();
    if (!targetId) return members.map(m => ({...m}));

    const getParent = m =>
      currentSide === 'paternal'
        ? (m.paternalParentId || m.parentId || null)
        : (m.maternalParentId || null);

    // 1. Walk UP the active chain from target person
    const ancestorIds = new Set();
    let cur = targetId;
    const seen = new Set();
    while (cur && !seen.has(cur)) {
      seen.add(cur); ancestorIds.add(cur);
      const m = members.find(x => x.id === cur);
      cur = m ? getParent(m) : null;
    }

    // 2. Walk DOWN from target — include all descendants via any parent link
    const anyChildMap = {};
    members.forEach(m => {
      ['paternalParentId','maternalParentId','parentId'].forEach(f => {
        if (m[f]) (anyChildMap[m[f]] = anyChildMap[m[f]] || []).push(m.id);
      });
    });

    const descendantIds = new Set();
    const queue = [targetId];
    const visited = new Set();
    while (queue.length) {
      const id = queue.shift();
      if (visited.has(id)) continue;
      visited.add(id); descendantIds.add(id);
      (anyChildMap[id] || []).forEach(c => queue.push(c));
      // Also include children of this person's spouse
      const m = members.find(x => x.id === id);
      const spId = m?.spouseId || members.find(x => x.spouseId === id)?.id;
      if (spId) {
        descendantIds.add(spId);
        (anyChildMap[spId] || []).forEach(c => queue.push(c));
      }
    }

    const allIds = new Set([...ancestorIds, ...descendantIds]);
    const result = members.filter(m => allIds.has(m.id)).map(m => ({...m}));
    const resultIds = new Set(result.map(m => m.id));

    // 3. Add spouses of ancestors as leaf nodes (ancestry stripped — won't show their chain)
    result.slice().forEach(m => {
      if (!ancestorIds.has(m.id)) return;
      const spId = m.spouseId || members.find(x => x.spouseId === m.id)?.id;
      if (spId && !resultIds.has(spId)) {
        const sp = members.find(x => x.id === spId);
        if (sp) {
          result.push({ ...sp, paternalParentId: null, maternalParentId: null, parentId: null });
          resultIds.add(spId);
        }
      }
    });

    return result;
  }

  const visibleMembers = getVisibleMembers();
  if (!visibleMembers.length) {
    svg.setAttribute('viewBox','0 0 600 300');
    svg.setAttribute('width',600); svg.setAttribute('height',300);
    const t = document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',300); t.setAttribute('y',150); t.setAttribute('text-anchor','middle');
    t.setAttribute('font-size','16'); t.setAttribute('fill','#94a3b8');
    t.textContent = `No ${currentSide} members yet. Add some using the form!`;
    svg.appendChild(t); return;
  }

  const { pos, childMap } = buildLayout(visibleMembers);
  layoutPos = pos;

  const P = {};
  visibleMembers.forEach(m => { P[m.id] = nodePos[m.id] || pos[m.id]; });

  const xs = Object.values(P).map(p => p?.x ?? 0);
  const ys = Object.values(P).map(p => p?.y ?? 0);
  const W  = Math.max(900, Math.max(...xs) + NW + 120);
  const H  = Math.max(500, Math.max(...ys) + NH + 120);
  svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
  svg.setAttribute('width', W); svg.setAttribute('height', H);

  // Edge layer (redrawn on drag)
  const edgeLayer = document.createElementNS('http://www.w3.org/2000/svg','g');
  edgeLayer.id = 'edgeLayer';
  svg.appendChild(edgeLayer);

  // Node layer
  const nodeLayer = document.createElementNS('http://www.w3.org/2000/svg','g');
  nodeLayer.id = 'nodeLayer';
  svg.appendChild(nodeLayer);

  function redrawEdges(P) {
    edgeLayer.innerHTML = '';

    // Group children by parentId using active side
    const activeParent = m =>
      currentSide === 'paternal' ? (m.paternalParentId || m.parentId) : m.maternalParentId;
    const byParent = {};
    visibleMembers.forEach(m => {
      const pid = activeParent(m);
      if (pid) (byParent[pid] = byParent[pid] || []).push(m.id);
    });

    Object.keys(byParent).forEach(pId => {
      const pp = P[pId]; if (!pp) return;
      const parent = visibleMembers.find(x => x.id === pId);

      // Couple center X for parent
      const spId = parent?.spouseId || visibleMembers.find(x => x.spouseId === pId)?.id;
      const pCx = spId && P[spId]
        ? (pp.x + NW/2 + P[spId].x + NW/2) / 2
        : pp.x + NW/2;
      const pBy = pp.y + NH; // parent bottom Y

      const kids = byParent[pId].map(id => P[id]).filter(Boolean);
      if (!kids.length) return;

      const kidCxs = byParent[pId].map(id => {
        const kp = P[id]; if (!kp) return null;
        return kp.x + NW/2;
      }).filter(x => x !== null);

      const minKx = Math.min(...kidCxs);
      const maxKx = Math.max(...kidCxs);
      const minKy = Math.min(...kids.map(k => k.y));
      const midY  = (pBy + minKy) / 2;

      // Vertical stem from parent couple center
      const stem = document.createElementNS('http://www.w3.org/2000/svg','line');
      stem.setAttribute('x1', pCx); stem.setAttribute('y1', pBy);
      stem.setAttribute('x2', pCx); stem.setAttribute('y2', midY);
      stem.setAttribute('class','edge');
      edgeLayer.appendChild(stem);

      // Horizontal branch - always draw (connects stem to child drops even for single child)
      const hLine = document.createElementNS('http://www.w3.org/2000/svg','line');
      hLine.setAttribute('x1', Math.min(minKx, pCx));
      hLine.setAttribute('y1', midY);
      hLine.setAttribute('x2', Math.max(maxKx, pCx));
      hLine.setAttribute('y2', midY);
      hLine.setAttribute('class','edge');
      edgeLayer.appendChild(hLine);

      // Vertical drops from horizontal to each child
      byParent[pId].forEach(cId => {
        const cp = P[cId]; if (!cp) return;
        const cx = cp.x + NW/2;
        const drop = document.createElementNS('http://www.w3.org/2000/svg','line');
        drop.setAttribute('x1', cx); drop.setAttribute('y1', midY);
        drop.setAttribute('x2', cx); drop.setAttribute('y2', cp.y);
        drop.setAttribute('class','edge');
        edgeLayer.appendChild(drop);
      });
    });

    // Spouse edges
    const drawn = new Set();
    visibleMembers.forEach(m => {
      if (!m.spouseId) return;
      const key = [m.id, m.spouseId].sort().join('-');
      if (drawn.has(key)) return; drawn.add(key);
      const a = P[m.id], b = P[m.spouseId];
      if (!a || !b) return;
      const path = document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d', `M${a.x+NW},${a.y+NH/2} L${b.x},${b.y+NH/2}`);
      path.setAttribute('class','spouse-edge');
      edgeLayer.appendChild(path);
    });
  }

  redrawEdges(P);

  // Drag state
  let drag = null; // { id, startMx, startMy, startX, startY }

  function svgPt(e) {
    const rect = svg.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: (clientX - rect.left) / scale,
      y: (clientY - rect.top)  / scale
    };
  }

  // Photo popup logic
  const popup  = document.getElementById('photoPopup');
  const pImg   = document.getElementById('photoImg');
  const pIcon  = document.getElementById('photoIcon');
  const pName  = document.getElementById('photoName');
  let hoverTimer = null;

  function showPopup(m, nodeEl) {
    const rect = nodeEl.getBoundingClientRect();
    pName.textContent = m.name;
    if (m.photo) { pImg.src = m.photo; pImg.style.display='block'; pIcon.style.display='none'; }
    else         { pImg.style.display='none'; pIcon.style.display='flex'; }
    popup.classList.remove('show');
    void popup.offsetWidth;
    popup.classList.add('show');
    const pw = 120, ph = 150;
    let left = rect.left + rect.width/2 - pw/2;
    let top  = rect.top  - ph - 12 + window.scrollY;
    if (top < 8) top = rect.bottom + 12 + window.scrollY;
    left = Math.max(8, Math.min(left, window.innerWidth - pw - 8));
    popup.style.left = left + 'px';
    popup.style.top  = top  + 'px';
  }

  function hidePopup() { popup.classList.remove('show'); }

  // Draw nodes
  let dragged = false;
  visibleMembers.forEach(m => {
    const p = P[m.id]; if (!p) return;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class', `node ${m.gender}`);
    g.setAttribute('data-id', m.id);
    g.style.cursor = 'grab';

    const rect = document.createElementNS('http://www.w3.org/2000/svg','rect');
    rect.setAttribute('x', p.x); rect.setAttribute('y', p.y);
    rect.setAttribute('width', NW); rect.setAttribute('height', NH);
    rect.setAttribute('rx', 7);
    g.appendChild(rect);

    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    const firstName = m.name.split(' ')[0];
    const fontSize = firstName.length > 10 ? 9 : firstName.length > 7 ? 10 : 12;
    txt.setAttribute('font-size', fontSize);
    txt.setAttribute('x', p.x + NW/2); txt.setAttribute('y', p.y + NH/2);
    txt.setAttribute('text-anchor','middle'); txt.setAttribute('dominant-baseline','middle');
    txt.textContent = firstName;
    g.appendChild(txt);

    if (m.photo) {
      const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
      dot.setAttribute('cx', p.x + NW - 7); dot.setAttribute('cy', p.y + 7);
      dot.setAttribute('r', 5); dot.setAttribute('fill','#25d366');
      dot.setAttribute('stroke','white'); dot.setAttribute('stroke-width','1.5');
      g.appendChild(dot);
    }

    // Hover → show popup after short delay
    g.addEventListener('mouseenter', () => {
      hoverTimer = setTimeout(() => showPopup(m, rect), 600);
    });
    g.addEventListener('mouseleave', () => {
      clearTimeout(hoverTimer);
      hidePopup();
    });

    // Click → always open edit form (separate from hover popup)
    g.addEventListener('click', ev => {
      ev.stopPropagation();
      if (!dragged) { clearTimeout(hoverTimer); hidePopup(); loadForm(m.id); }
      dragged = false;
    });

    // Drag
    function onDragStart(e) {
      e.stopPropagation();
      if (e.type === 'mousedown' && e.button !== 0) return;
      dragged = false;
      g.style.cursor = 'grabbing';
      const pt = svgPt(e);
      drag = { id: m.id, startMx: pt.x, startMy: pt.y, startX: P[m.id].x, startY: P[m.id].y };
    }
    g.addEventListener('mousedown', onDragStart);
    g.addEventListener('touchstart', onDragStart, { passive: true });

    nodeLayer.appendChild(g);
  });

  // Mouse move – update node + edges
  function onMove(e) {
    if (!drag) return;
    e.preventDefault();
    dragged = true;
    const pt = svgPt(e);
    const dx = pt.x - drag.startMx, dy = pt.y - drag.startMy;
    const nx = drag.startX + dx, ny = drag.startY + dy;

    P[drag.id] = { x: nx, y: ny };

    // Move the SVG group
    const g = nodeLayer.querySelector(`[data-id="${drag.id}"]`);
    if (g) {
      g.querySelector('rect').setAttribute('x', nx);
      g.querySelector('rect').setAttribute('y', ny);
      g.querySelector('text').setAttribute('x', nx + NW/2);
      g.querySelector('text').setAttribute('y', ny + NH/2);
    }
    redrawEdges(P);
  }

  function onUp(e) {
    if (!drag) return;
    nodePos[drag.id] = { ...P[drag.id] };
    const g = nodeLayer.querySelector(`[data-id="${drag.id}"]`);
    if (g) g.style.cursor = 'grab';
    drag = null;
  }

  svg.addEventListener('mousemove', onMove);
  svg.addEventListener('mouseup', onUp);
  svg.addEventListener('mouseleave', onUp);
  svg.addEventListener('touchmove', onMove, { passive: false });
  svg.addEventListener('touchend', onUp);
}

function render() {
  document.getElementById('cnt').textContent = `${members.length} members`;
  populateSelects();
  updatePersonSelect();
  if (!focalPersonId && members.length) focalPersonId = getDefaultLeaf();
  document.getElementById('personSelect').value = focalPersonId || '';
  drawTree();
}


// ─── Export ────────────────────────────────────────────────────────────────
function exportJSON() {
  const a = document.createElement('a');
  a.href = 'data:text/json,' + encodeURIComponent(JSON.stringify(members,null,2));
  a.download = 'family-tree.json'; a.click();
}
function importJSON() {
  const inp = document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange = e => {
    const r = new FileReader();
    r.onload = ev => {
      try { members = JSON.parse(ev.target.result); persist(); render(); alert('Loaded!'); }
      catch { alert('Invalid file'); }
    };
    r.readAsText(e.target.files[0]);
  };
  inp.click();
}
function svgToCanvas(callback) {
  const svg = document.getElementById('svg');

  // Clone SVG and inline all styles so they survive serialization
  const clone = svg.cloneNode(true);

  // Embed CSS directly into the cloned SVG
  const style = document.createElementNS('http://www.w3.org/2000/svg', 'style');
  style.textContent = `
    rect { rx: 7; }
    .node.male   rect { fill:#93c5fd; stroke:#2563eb; stroke-width:2; }
    .node.female rect { fill:#fbcfe8; stroke:#db2777; stroke-width:2; }
    .node.other  rect { fill:#d1d5db; stroke:#6b7280; stroke-width:2; }
    .node text   { font-family:Segoe UI,Arial,sans-serif; font-size:12px; font-weight:700; fill:#1e293b; }
    .edge        { fill:none; stroke:#64748b; stroke-width:2.5; }
    .spouse-edge { fill:none; stroke:#f97316; stroke-width:2.5; stroke-dasharray:6,4; }
  `;
  clone.insertBefore(style, clone.firstChild);

  // Set background
  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width', '100%'); bg.setAttribute('height', '100%');
  bg.setAttribute('fill', '#f8fafc');
  clone.insertBefore(bg, clone.firstChild);

  const svgData = new XMLSerializer().serializeToString(clone);
  const svgBlob = new Blob([svgData], { type: 'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(svgBlob);

  const img = new Image();
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width  = svg.width.baseVal.value  * 2;
    canvas.height = svg.height.baseVal.value * 2;
    const ctx = canvas.getContext('2d');
    ctx.scale(2, 2);
    ctx.drawImage(img, 0, 0);
    URL.revokeObjectURL(url);
    callback(canvas);
  };
  img.onerror = () => alert('Export failed — try a different browser.');
  img.src = url;
}

function exportPNG() {
  svgToCanvas(canvas => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'family-tree.png';
    a.click();
  });
}

function exportPDF() {
  svgToCanvas(canvas => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a3' });
    const W = pdf.internal.pageSize.getWidth();
    const H = pdf.internal.pageSize.getHeight();
    const imgW = canvas.width  / 2;
    const imgH = canvas.height / 2;
    const ratio = Math.min(W / imgW, H / imgH);
    const x = (W - imgW * ratio) / 2;
    const y = (H - imgH * ratio) / 2;
    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', x, y, imgW * ratio, imgH * ratio);
    pdf.save('family-tree.pdf');
  });
}

render();
