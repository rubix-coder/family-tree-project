<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FamilyTree Social — Connect Your Roots</title>
  <meta name="description" content="Build, share, and explore your family history together. A social platform for family trees.">
  <link rel="stylesheet" href="/css/app.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">
</head>
<body>

<div id="toast-container" class="toast-container"></div>

<div id="app">

  <!-- ═══ AUTH PAGE ══════════════════════════════════════════════════ -->
  <div id="view-auth" style="display:none">
    <div id="auth-page">
      <div class="auth-card">
        <div class="auth-logo">
          <span class="logo-icon">🌳</span>
          <h1>FamilyTree Social</h1>
          <p>Connect your roots, share your story</p>
        </div>
        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Sign In</button>
          <button class="auth-tab" data-tab="register">Create Account</button>
        </div>

        <!-- Login Form -->
        <div id="form-login">
          <div id="login-error" class="alert alert-error" style="display:none"></div>
          <form>
            <div class="form-group">
              <label>Email or Username</label>
              <input name="login" type="text" class="form-control" placeholder="your@email.com" required autocomplete="username">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input name="password" type="password" class="form-control" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Sign In</button>
          </form>
          <p style="text-align:center;margin-top:1rem;font-size:.85rem;color:var(--gray-500)">
            Don't have an account? <a href="#" onclick="App.switchAuthTab('register')">Create one</a>
          </p>
        </div>

        <!-- Register Form -->
        <div id="form-register" style="display:none">
          <div id="register-error" class="alert alert-error" style="display:none"></div>
          <form>
            <div class="form-row">
              <div class="form-group">
                <label>Display Name</label>
                <input name="display_name" type="text" class="form-control" placeholder="John Smith" required>
              </div>
              <div class="form-group">
                <label>Username</label>
                <input name="username" type="text" class="form-control" placeholder="johnsmith" required autocomplete="username">
              </div>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input name="email" type="email" class="form-control" placeholder="john@example.com" required autocomplete="email">
            </div>
            <div class="form-group">
              <label>Password</label>
              <input name="password" type="password" class="form-control" placeholder="At least 6 characters" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full btn-lg">Create Account</button>
          </form>
          <p style="text-align:center;margin-top:1rem;font-size:.85rem;color:var(--gray-500)">
            Already have an account? <a href="#" onclick="App.switchAuthTab('login')">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ INVITE PAGE ════════════════════════════════════════════════ -->
  <div id="view-invite" style="display:none"></div>

  <!-- ═══ MAIN APP ═══════════════════════════════════════════════════ -->
  <div id="view-main" style="display:none">

    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <a href="#" class="header-logo" onclick="App.navigate('dashboard')">
          🌳 FamilyTree
        </a>
        <div class="header-search">
          <span class="search-icon">🔍</span>
          <input type="search" placeholder="Search family members..." id="global-search">
        </div>
        <div class="header-actions">
          <div style="position:relative">
            <button class="notif-btn" id="notif-btn" aria-label="Notifications">
              🔔
              <span class="notif-badge" id="notif-badge" style="display:none">0</span>
            </button>
            <div class="notif-dropdown" id="notif-dropdown"></div>
          </div>
          <button class="avatar-btn" id="avatar-btn" onclick="App.navigate('profile')"></button>
          <button class="btn btn-ghost btn-sm" style="color:rgba(255,255,255,.7)" onclick="App.logout()" title="Sign out">↩</button>
        </div>
      </div>
    </header>

    <!-- Main Layout -->
    <div class="main-layout">

      <!-- Sidebar Navigation -->
      <nav class="sidebar">
        <div class="sidebar-nav">
          <a class="nav-item" data-nav="dashboard" href="#" onclick="App.navigate('dashboard')">
            <span class="nav-icon">🏠</span> Home
          </a>
          <a class="nav-item" data-nav="trees" href="#" onclick="App.navigate('trees')">
            <span class="nav-icon">🌳</span> Family Trees
          </a>
          <a class="nav-item" data-nav="notifications" href="#" onclick="App.navigate('notifications')">
            <span class="nav-icon">🔔</span> Notifications
          </a>
          <a class="nav-item" data-nav="profile" href="#" onclick="App.navigate('profile')">
            <span class="nav-icon">👤</span> Profile
          </a>
          <a class="nav-item" data-nav="settings" href="#" onclick="App.renderSettings()">
            <span class="nav-icon">⚙️</span> Settings
          </a>
        </div>

        <!-- Quick create -->
        <div class="card mt-3" style="padding:1rem;text-align:center">
          <div style="font-size:.82rem;color:var(--gray-500);margin-bottom:.6rem">Start a new family tree</div>
          <button class="btn btn-primary btn-full btn-sm" onclick="App.showCreateTree()">+ New Tree</button>
        </div>
      </nav>

      <!-- Main Content -->
      <main class="main-content" id="main-content">
        <div class="loading-screen"><span class="spinner"></span></div>
      </main>

    </div>
  </div>

</div>

<script src="/js/api.js"></script>
<script src="/js/tree.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
